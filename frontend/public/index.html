<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header>
  <div class="site-title">Gas Tracker</div>
  <div class="header-right">
    <div id="last-updated" class="last-updated">—</div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <span class="theme-icon">Light</span>
    </button>
  </div>
</header>

<main>

  <div class="top-row">

    <div class="stat-card">
      <div class="stat-label">Average</div>
      <div class="avg-inner">
        <div class="avg-block">
          <div class="avg-type">Unleaded</div>
          <div class="stat-value accent" id="avg-unleaded">—</div>
        </div>
        <div class="avg-divider"></div>
        <div class="avg-block">
          <div class="avg-type">Premium</div>
          <div class="stat-value purple" id="avg-premium">—</div>
        </div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Low</div>
      <div class="avg-inner">
        <div class="avg-block">
          <div class="avg-type">Unleaded</div>
          <div class="stat-value green" id="min-unleaded">—</div>
        </div>
        <div class="avg-divider"></div>
        <div class="avg-block">
          <div class="avg-type">Premium</div>
          <div class="stat-value green-soft" id="min-premium">—</div>
        </div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">High</div>
      <div class="avg-inner">
        <div class="avg-block">
          <div class="avg-type">Unleaded</div>
          <div class="stat-value red" id="max-unleaded">—</div>
        </div>
        <div class="avg-divider"></div>
        <div class="avg-block">
          <div class="avg-type">Premium</div>
          <div class="stat-value red-soft" id="max-premium">—</div>
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-row">

    <div class="col-left">

      <div class="rec-banner" id="rec-banner">
        <div class="rec-left">
          <div class="rec-badge" id="rec-badge">—</div>
          <div class="rec-desc" id="rec-detail">Analyzing trend...</div>
        </div>
      </div>

      <div class="card brand-card">
        <div class="card-title">Prices by Brand</div>
        <div class="brand-list" id="brand-list">
          <div class="loading-text">Loading...</div>
        </div>
        <div class="data-source">Data source: Sam's Club & GasBuddy</div>
      </div>

    </div>

    <div class="col-right">

      <div class="card chart-card">
        <div class="chart-header">
          <div class="chart-title">
            <span id="fuel-label">Unleaded</span> Price Trend
          </div>
          <div class="chart-controls">
            <div class="tab-group">
              <button class="tab-btn active" data-type="days" data-days="1">24h</button>
              <button class="tab-btn" data-type="days" data-days="7">7d</button>
            </div>
            <div class="tab-group">
              <button class="tab-btn active" data-type="fuel" data-fuel="unleaded">Unleaded</button>
              <button class="tab-btn" data-type="fuel" data-fuel="premium">Premium</button>
            </div>
            <div class="chart-legend" id="chart-legend"></div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

    </div>

  </div>

</main>

<footer>
  <div class="footer-copy">&copy; 2026 tomsan-site</div>
</footer>

<script type="module" src="./js/main.js"></script>
</body>
</html>
